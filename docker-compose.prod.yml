services:
  db:
    image: postgres:16
    env_file:
      - ./.env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-acopio360}
      POSTGRES_USER: ${POSTGRES_USER:-acopio360}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acopio360}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acopio360 -d acopio360"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env.production
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-acopio360}:${POSTGRES_PASSWORD:-acopio360}@db:5432/${POSTGRES_DB:-acopio360}
    command: >
      sh -c "python manage.py migrate &&
             if [ \"${SEED_DEMO:-0}\" = \"1\" ]; then python manage.py seed_demo; fi &&
             python manage.py collectstatic --noinput &&
             gunicorn acopio360.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/reports/basic/')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: https://apiretracemx.softwaresci.org/api
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
