services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: acopio360
      POSTGRES_USER: acopio360
      POSTGRES_PASSWORD: acopio360
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acopio360 -d acopio360"]
      interval: 5s
      timeout: 5s
      retries: 10
  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    command: sh -c "python manage.py migrate && python manage.py seed_demo && python manage.py runserver 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: /api
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
